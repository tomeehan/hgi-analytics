name: dbt CI

on:
  pull_request:
    branches: [main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: dbt/requirements.txt

      - run: pip install -r dbt/requirements.txt

      - name: sqlfluff lint
        working-directory: dbt/
        continue-on-error: true
        run: sqlfluff lint models/

      - name: Write Snowflake private key
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.snowflake/keys
          printf '%s' "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/keys/rsa_key.p8
          chmod 600 ~/.snowflake/keys/rsa_key.p8

      - name: Generate profiles.yml
        working-directory: dbt/
        run: |
          cat > profiles.yml <<'PROFILE'
          hgi:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
                user: "{{ env_var('SNOWFLAKE_USER') }}"
                private_key_path: "{{ env_var('HOME') }}/.snowflake/keys/rsa_key.p8"
                role: TRANSFORMER
                database: HGI
                warehouse: HGI_WH
                schema: PUBLIC
                threads: 4
          PROFILE

      - run: dbt deps
        working-directory: dbt/

      - name: Download production manifest
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: dbt_run.yml
          name: dbt-prod-manifest
          path: dbt/prod-state/
        continue-on-error: true
        id: download-manifest

      - name: dbt build (modified only)
        if: steps.download-manifest.outcome == 'success'
        run: dbt build --select state:modified+ --defer --state prod-state/
        working-directory: dbt/
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}

      - name: dbt build (full — no prior manifest)
        if: steps.download-manifest.outcome != 'success'
        run: dbt build
        working-directory: dbt/
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
