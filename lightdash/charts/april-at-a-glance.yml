chartConfig:
  config:
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: false
    showRowCalculation: false
    showTableNames: true
  type: table
contentType: chart
description: >-
  Cross-brand summary table for the month selected by the dashboard Month
  filter. One row per brand, columns mirror the page-2 'April 2026 at a glance'
  table of the KPI Report PDF: Revenue (Shopify), Shopify Orders, Sessions,
  Trans (GA), Shopify CVR, Shopify RPS. Reads fct_brand_monthly_summary, which
  outer-joins Shopify + GA4 so every loaded brand renders even without GA data.
  GA columns populate for iS Clinical only today (other brands' GA4 Airbyte
  connections are not yet landed).
