# Source: April 2026 KPI Report, page 17 (12-month subscriber growth)
chartConfig:
  config:
    flipColors: false
    label: Net Change (12 mo)
    selectedField: fct_klaviyo_subscriber_growth_total_net_subscriber_change
    showComparison: false
  type: big_number
contentType: chart
description: >-
  iS Clinical Klaviyo email-list net subscriber change over the trailing 12
  months (May 2025 to April 2026): subscribers added minus unsubscribes. Built
  from raw BRONZE_KLAVIYO_ISCLINICAL events via fct_klaviyo_subscriber_growth
  (monthly grain). This is a fixed rolling 12-month total pinned to the April
  2026 report month, so it deliberately does not respond to the dashboard Month
  filter.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions: []
  exploreName: fct_klaviyo_subscriber_growth
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_klaviyo_subscriber_growth_store_id
          values:
            - iS Clinical
        - id: f2
          operator: inBetween
          target:
            fieldId: fct_klaviyo_subscriber_growth_order_month
          values:
            - "2025-05-01"
            - "2026-04-01"
      id: isclinical-trailing-12mo
  limit: 1
  metricOverrides: {}
  metrics:
    - fct_klaviyo_subscriber_growth_total_net_subscriber_change
  sorts: []
  tableCalculations: []
name: iS Clinical Net Subscriber Change (12 mo)
slug: isclinical-net-subscriber-change-12mo
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_klaviyo_subscriber_growth_total_net_subscriber_change
tableName: fct_klaviyo_subscriber_growth
verification: null
version: 1
