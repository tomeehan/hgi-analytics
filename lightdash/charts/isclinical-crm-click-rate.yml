# Source: April 2026 KPI Report, page 16 (IS CLINICAL, 7. CRM Performance)
chartConfig:
  config:
    flipColors: false
    label: Click Rate
    selectedField: fct_campaign_performance_avg_click_rate
    showComparison: false
  type: big_number
contentType: chart
description: >-
  iS Clinical email click rate: unique clicks divided by delivered, recomputed
  post-aggregation (weighted ratio metric) so the Month-filtered value reads
  the exact monthly figure. Built from raw BRONZE_KLAVIYO_ISCLINICAL Received
  and Clicked Email events (fct_campaign_performance). Responds to the dashboard
  Month filter.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions: []
  exploreName: fct_campaign_performance
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_campaign_performance_store_id
          values:
            - iS Clinical
      id: isclinical-only
  limit: 1
  metricOverrides: {}
  metrics:
    - fct_campaign_performance_avg_click_rate
  sorts: []
  tableCalculations: []
name: iS Clinical Click Rate
slug: isclinical-crm-click-rate
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_campaign_performance_avg_click_rate
tableName: fct_campaign_performance
verification: null
version: 1
