chartConfig:
  config:
    columns: {}
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: false
    showRowCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: >-
  Top five iS Clinical Klaviyo email campaigns by placed-order revenue. Revenue
  is order value attributed to a campaign within a 5-day engagement window.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_klaviyo_campaign_revenue_campaign_name
  exploreName: fct_klaviyo_campaign_revenue
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_klaviyo_campaign_revenue_store_id
          values:
            - iS Clinical
      id: isclinical-campaigns
  limit: 5
  metricOverrides: {}
  metrics:
    - fct_klaviyo_campaign_revenue_total_campaign_revenue
  sorts:
    - descending: true
      fieldId: fct_klaviyo_campaign_revenue_total_campaign_revenue
  tableCalculations: []
name: iS Clinical Top Performing Campaigns
slug: isclinical-top-performing-campaigns
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_klaviyo_campaign_revenue_campaign_name
    - fct_klaviyo_campaign_revenue_total_campaign_revenue
tableName: fct_klaviyo_campaign_revenue
verification: null
version: 1
