chartConfig:
  config:
    eChartsConfig:
      series:
        - encode:
            xRef:
              field: fct_klaviyo_subscriber_growth_order_month
            yRef:
              field: fct_klaviyo_subscriber_growth_total_net_subscriber_change
          type: bar
      xAxis:
        - axisLabel:
            formatter: "{MMMM} {yyyy}"
            hideOverlap: true
    layout:
      flipAxes: false
      xField: fct_klaviyo_subscriber_growth_order_month
      yField:
        - fct_klaviyo_subscriber_growth_total_net_subscriber_change
  type: cartesian
contentType: chart
description: >-
  iS Clinical Klaviyo net subscriber change per calendar month over a trailing
  12-month window: subscribers added minus unsubscribes. A positive bar means
  the list grew that month; a negative bar means it shrank.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_klaviyo_subscriber_growth_order_month
  exploreName: fct_klaviyo_subscriber_growth
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_klaviyo_subscriber_growth_store_id
          values:
            - iS Clinical
        - id: f2
          operator: equals
          target:
            fieldId: fct_klaviyo_subscriber_growth_order_month_label
          values:
            - "2025-05"
            - "2025-06"
            - "2025-07"
            - "2025-08"
            - "2025-09"
            - "2025-10"
            - "2025-11"
            - "2025-12"
            - "2026-01"
            - "2026-02"
            - "2026-03"
            - "2026-04"
      id: isclinical-trailing-12mo
  limit: 12
  metricOverrides: {}
  metrics:
    - fct_klaviyo_subscriber_growth_total_net_subscriber_change
  sorts:
    - descending: false
      fieldId: fct_klaviyo_subscriber_growth_order_month
  tableCalculations: []
name: iS Clinical Subscriber Growth (12 mo, monthly)
slug: subscriber-growth-monthly-bar-chart
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_klaviyo_subscriber_growth_order_month
    - fct_klaviyo_subscriber_growth_total_net_subscriber_change
tableName: fct_klaviyo_subscriber_growth
verification: null
version: 1
