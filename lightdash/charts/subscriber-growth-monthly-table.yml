chartConfig:
  config:
    columns:
      # The raw date order_month is kept in the query purely to sort rows
      # chronologically (order_month_name is a string and would sort
      # alphabetically); hide it so only the readable "Month YYYY" column shows.
      fct_klaviyo_subscriber_growth_order_month:
        visible: false
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: true
    showRowCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: >-
  iS Clinical Klaviyo subscriber movement per calendar month over a trailing
  12-month window: one row per month with subscribers added, unsubscribes and
  net change. The footer shows 12-month column totals.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_klaviyo_subscriber_growth_order_month
    - fct_klaviyo_subscriber_growth_order_month_name
  exploreName: fct_klaviyo_subscriber_growth
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_klaviyo_subscriber_growth_store_id
          values:
            - iS Clinical
        - id: f2
          operator: equals
          target:
            fieldId: fct_klaviyo_subscriber_growth_order_month_label
          values:
            - "2025-05"
            - "2025-06"
            - "2025-07"
            - "2025-08"
            - "2025-09"
            - "2025-10"
            - "2025-11"
            - "2025-12"
            - "2026-01"
            - "2026-02"
            - "2026-03"
            - "2026-04"
      id: isclinical-trailing-12mo
  limit: 12
  metricOverrides: {}
  metrics:
    - fct_klaviyo_subscriber_growth_total_subscribers_added
    - fct_klaviyo_subscriber_growth_total_unsubscribes
    - fct_klaviyo_subscriber_growth_total_net_subscriber_change
  sorts:
    - descending: false
      fieldId: fct_klaviyo_subscriber_growth_order_month
  tableCalculations: []
name: iS Clinical Subscriber Growth (12 mo table)
slug: subscriber-growth-monthly-table
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_klaviyo_subscriber_growth_order_month_name
    - fct_klaviyo_subscriber_growth_order_month
    - fct_klaviyo_subscriber_growth_total_subscribers_added
    - fct_klaviyo_subscriber_growth_total_unsubscribes
    - fct_klaviyo_subscriber_growth_total_net_subscriber_change
tableName: fct_klaviyo_subscriber_growth
verification: null
version: 1
