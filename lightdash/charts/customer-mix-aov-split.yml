chartConfig:
  config:
    columns: {}
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: true
    showRowCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: >-
  iS Clinical Shopify orders split into new and returning customers, with
  order count, revenue share and AOV per segment. Revenue and AOV here use
  Shopify Gross sales (product price x quantity, before any discount,
  return, tax or shipping) so the figures are comparable to the headline
  Gross Sales tile.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_orders_customer_type
  exploreName: fct_orders
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_orders_store_id
          values:
            - iS Clinical
      id: isclinical-only
  limit: 500
  metricOverrides: {}
  metrics:
    - fct_orders_order_count
    - fct_orders_total_gross_sales
    - fct_orders_total_net_sales
  sorts:
    - descending: false
      fieldId: fct_orders_customer_type
  tableCalculations:
    - displayName: "% Orders"
      format:
        round: 1
        type: percent
      name: pct_orders
      sql: >-
        ${fct_orders.order_count} / NULLIF(SUM(${fct_orders.order_count}) OVER
        (), 0)
    - displayName: "% Gross Revenue"
      format:
        round: 1
        type: percent
      name: pct_revenue
      sql: >-
        ${fct_orders.total_gross_sales} / NULLIF(SUM(${fct_orders.total_gross_sales})
        OVER (), 0)
    - displayName: Gross AOV
      format:
        currency: GBP
        round: 2
        type: currency
      name: gross_aov
      sql: >-
        ${fct_orders.total_gross_sales} / NULLIF(${fct_orders.order_count}, 0)
    - displayName: Net AOV
      format:
        currency: GBP
        round: 2
        type: currency
      name: net_aov
      sql: >-
        ${fct_orders.total_net_sales} / NULLIF(${fct_orders.order_count}, 0)
name: iS Clinical Customer Mix & AOV Split
slug: customer-mix-aov-split
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_orders_customer_type
    - fct_orders_order_count
    - pct_orders
    - fct_orders_total_gross_sales
    - fct_orders_total_net_sales
    - pct_revenue
    - gross_aov
    - net_aov
tableName: fct_orders
verification: null
version: 1
