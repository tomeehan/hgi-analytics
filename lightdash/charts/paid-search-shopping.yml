chartConfig:
  config:
    columns: {}
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: true
    showRowCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: >-
  iS Clinical Google Ads search-term performance split by brand intent (Branded
  vs Non-branded): clicks, cost, conversions and cost share. Brand intent is a
  name-pattern classification of the search-term text, scoped to the top 100
  terms by cost. Google Ads only retains search terms above a minimum impression
  threshold, so low-volume terms are excluded.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_google_ads_search_terms_brand_intent
  exploreName: fct_google_ads_search_terms
  filters: {}
  limit: 500
  metricOverrides: {}
  metrics:
    - fct_google_ads_search_terms_total_clicks
    - fct_google_ads_search_terms_total_cost
    - fct_google_ads_search_terms_total_conversions
  sorts:
    - descending: true
      fieldId: fct_google_ads_search_terms_total_cost
  tableCalculations:
    - displayName: "% of Cost"
      format:
        round: 1
        type: percent
      name: pct_of_cost
      sql: >-
        ${fct_google_ads_search_terms.total_cost} /
        NULLIF(SUM(${fct_google_ads_search_terms.total_cost}) OVER (), 0)
name: iS Clinical Paid Search, Branded vs Non-branded
slug: paid-search-shopping
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_google_ads_search_terms_brand_intent
    - fct_google_ads_search_terms_total_clicks
    - fct_google_ads_search_terms_total_cost
    - fct_google_ads_search_terms_total_conversions
    - pct_of_cost
tableName: fct_google_ads_search_terms
verification: null
version: 1
