chartConfig:
  config:
    columns: {}
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: false
    showRowCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: >-
  Top five iS Clinical Klaviyo automated flows by placed-order revenue. Revenue
  is order value attributed to a flow within a 5-day engagement window. Each
  flow is shown as a single row, including flows with multiple variants.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_klaviyo_flow_revenue_flow_name
  exploreName: fct_klaviyo_flow_revenue
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_klaviyo_flow_revenue_store_id
          values:
            - iS Clinical
      id: isclinical-flows
  limit: 5
  metricOverrides: {}
  metrics:
    - fct_klaviyo_flow_revenue_total_flow_revenue
  sorts:
    - descending: true
      fieldId: fct_klaviyo_flow_revenue_total_flow_revenue
  tableCalculations: []
name: iS Clinical Top Performing Flows
slug: isclinical-top-flows
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_klaviyo_flow_revenue_flow_name
    - fct_klaviyo_flow_revenue_total_flow_revenue
tableName: fct_klaviyo_flow_revenue
verification: null
version: 1
