chartConfig:
  config:
    eChartsConfig:
      series:
        - encode:
            xRef:
              field: dim_customer_unified_customer_universe
            yRef:
              field: dim_customer_unified_customer_count
          type: bar
    layout:
      flipAxes: true
      xField: dim_customer_unified_customer_universe
      yField:
        - dim_customer_unified_customer_count
  type: cartesian
contentType: chart
description: >-
  Of the ~2,500 CRM B2B customers, how many are also Shopify shoppers — split by
  store
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - dim_customer_unified_customer_universe
  exploreName: dim_customer_unified
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: dim_customer_unified_seen_in_crm
          values:
            - b2b
      id: b2b-only
  limit: 10
  metricOverrides: {}
  metrics:
    - dim_customer_unified_customer_count
  sorts:
    - descending: true
      fieldId: dim_customer_unified_customer_count
  tableCalculations: []
name: B2B Customers Also Shopping DTC
slug: b2b-customers-also-shopping-dtc
spaceSlug: shared
tableConfig:
  columnOrder:
    - dim_customer_unified_customer_universe
    - dim_customer_unified_customer_count
tableName: dim_customer_unified
verification: null
version: 1
