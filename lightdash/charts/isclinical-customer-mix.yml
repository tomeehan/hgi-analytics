# Source: April 2026 KPI Report, page 12 (IS CLINICAL, 1. REVENUE & CHANNEL ATTRIBUTION)
chartConfig:
  config:
    flipColors: false
    label: iS Clinical Customer Mix (new %)
    selectedField: fct_orders_new_customer_share
    showComparison: false
  type: big_number
contentType: chart
description: >-
  Customer mix for iS Clinical Shopify orders, expressed as the new-customer
  share: the percentage of orders that are a customer's first order
  (is_first_order = 1). The PDF KPI strip frames this as new / returning (April
  2026: 36% / 64%); this tile surfaces the new-customer half. Responds to the
  dashboard Month filter.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions: []
  exploreName: fct_orders
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_orders_store_id
          values:
            - iS Clinical
      id: isclinical-only
  limit: 1
  metricOverrides: {}
  metrics:
    - fct_orders_new_customer_share
  sorts: []
  tableCalculations: []
name: iS Clinical Customer Mix (new %)
slug: isclinical-customer-mix
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_orders_new_customer_share
tableName: fct_orders
verification: null
version: 1
