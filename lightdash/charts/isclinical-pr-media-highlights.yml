# Source: April 2026 KPI Report, page 14 (IS CLINICAL, Traffic, conversion, PR, customer mix, AOV, panel 3. PR & MEDIA HIGHLIGHTS)
chartConfig:
  config:
    columns: {}
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: false
    showRowCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: >-
  Top GA4 referral / off-site traffic sources for iS Clinical, the closest
  proxy the report has for earned PR and media coverage, mirroring panel 3 on
  KPI Report page 14. The table is restricted to referral and quiz mediums so
  it surfaces non-paid, non-search referrers (a quiz partner, a sibling-brand
  domain, an AI assistant) rather than the full traffic mix, which is covered
  by the top-traffic-sources and converting-sources tables. Sessions and
  GA-attributed revenue come from the GA4 traffic-acquisition source/medium
  report. GA4 has no source/medium-dimensioned purchase-event report, so the
  PDF panel's transactions column is omitted here.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_ga_source_medium_source_medium
  exploreName: fct_ga_source_medium
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_ga_source_medium_session_medium
          values:
            - referral
            - quiz
      id: referral-and-quiz-only
  limit: 8
  metricOverrides: {}
  metrics:
    - fct_ga_source_medium_total_ga_source_medium_sessions
    - fct_ga_source_medium_total_ga_source_medium_revenue
  sorts:
    - descending: true
      fieldId: fct_ga_source_medium_total_ga_source_medium_sessions
  tableCalculations: []
name: iS Clinical PR & Media Highlights (GA4 referrers)
slug: isclinical-pr-media-highlights
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_ga_source_medium_source_medium
    - fct_ga_source_medium_total_ga_source_medium_sessions
    - fct_ga_source_medium_total_ga_source_medium_revenue
tableName: fct_ga_source_medium
verification: null
version: 1
