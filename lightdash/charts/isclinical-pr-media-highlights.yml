chartConfig:
  config:
    columns: {}
    hideRowNumbers: false
    metricsAsRows: false
    showColumnCalculation: false
    showRowCalculation: false
    showTableNames: false
  type: table
contentType: chart
description: >-
  Top GA4 referral and off-site traffic sources for iS Clinical, a proxy for
  earned PR and media coverage. Restricted to referral and quiz mediums to
  surface non-paid, non-search referrers. Sessions and GA-attributed revenue
  from the GA4 traffic-acquisition report; transaction data is not available at
  source/medium grain in GA4.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - fct_ga_source_medium_source_medium
  exploreName: fct_ga_source_medium
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_ga_source_medium_session_medium
          values:
            - referral
            - quiz
      id: referral-and-quiz-only
  limit: 8
  metricOverrides: {}
  metrics:
    - fct_ga_source_medium_total_ga_source_medium_sessions
    - fct_ga_source_medium_total_ga_source_medium_revenue
  sorts:
    - descending: true
      fieldId: fct_ga_source_medium_total_ga_source_medium_sessions
  tableCalculations: []
name: iS Clinical PR & Media Highlights (GA4 referrers)
slug: isclinical-pr-media-highlights
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_ga_source_medium_source_medium
    - fct_ga_source_medium_total_ga_source_medium_sessions
    - fct_ga_source_medium_total_ga_source_medium_revenue
tableName: fct_ga_source_medium
verification: null
version: 1
