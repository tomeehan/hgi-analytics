description: >-
  Total Meta ad spend per brand for the month selected by the dashboard Month
  filter. Horizontal bar chart with one bar per brand. Mirrors the page-2 'META
  SPEND SHARE BY BRAND' sub-box of the April 2026 KPI Report PDF (RL £14,467,
  ISC £7,657, Deese £457, HGI no spend). Today's Bronze data is dramatically
  short on RL spend (~£423 vs PDF £14,467), so the live chart will not match the
  PDF magnitudes until the Meta Revitalash sync catches up.
