# Source: April 2026 KPI Report, page 16 (IS CLINICAL, 7. CRM Performance)
chartConfig:
  config:
    flipColors: false
    label: iS Clinical Klaviyo Revenue
    selectedField: fct_klaviyo_revenue_total_klaviyo_revenue
    showComparison: false
  type: big_number
contentType: chart
description: >-
  Total revenue Klaviyo claims credit for: the sum of order value across Klaviyo
  Placed Order events attributed to a campaign or a flow within a 5-day
  engagement window, for iS Clinical. Built from raw BRONZE_KLAVIYO_ISCLINICAL
  events (fct_klaviyo_revenue.total_klaviyo_revenue). Responds to the dashboard
  Month filter.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions: []
  exploreName: fct_klaviyo_revenue
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_klaviyo_revenue_store_id
          values:
            - iS Clinical
      id: isclinical-only
  limit: 1
  metricOverrides: {}
  metrics:
    - fct_klaviyo_revenue_total_klaviyo_revenue
  sorts: []
  tableCalculations: []
name: iS Clinical Klaviyo Revenue
slug: isclinical-klaviyo-revenue
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_klaviyo_revenue_total_klaviyo_revenue
tableName: fct_klaviyo_revenue
verification: null
version: 1
