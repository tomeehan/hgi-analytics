chartConfig:
  config:
    flipColors: false
    label: Gross AOV
    selectedField: fct_orders_gross_aov
    showComparison: true
    comparisonField: fct_orders_net_aov
    comparisonFormat: raw
    comparisonLabel: Net AOV
  type: big_number
contentType: chart
description: >-
  Average Gross sales per Shopify order for iS Clinical: Gross sales divided
  by order count. Gross sales = product price x quantity before any
  discount, return, tax or shipping. Lower than Total AOV (which adds tax
  + shipping back in), and lower-or-equal to Net AOV (which is gross less
  discounts and returns).
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions: []
  exploreName: fct_orders
  filters:
    dimensions:
      and:
        - id: f1
          operator: equals
          target:
            fieldId: fct_orders_store_id
          values:
            - iS Clinical
      id: isclinical-only
  limit: 1
  metricOverrides: {}
  metrics:
    - fct_orders_gross_aov
    - fct_orders_net_aov
  sorts: []
  tableCalculations: []
name: iS Clinical Gross AOV (Shopify)
slug: isclinical-aov
spaceSlug: shared
tableConfig:
  columnOrder:
    - fct_orders_gross_aov
    - fct_orders_net_aov
tableName: fct_orders
verification: null
version: 1
