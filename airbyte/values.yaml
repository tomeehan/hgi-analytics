# Airbyte helm chart values for the hgi-airbyte Hetzner deployment.
#
# Apply on the VM with:
#   abctl local install --values airbyte/values.yaml
#
# (abctl detects the existing install and helm-upgrades in place. The
# upgrade will restart Airbyte pods, briefly interrupting any running
# sync. Drain the schedule first if that matters.)
#
# WHY THIS FILE EXISTS
# --------------------
# Per CLAUDE.md, Airbyte connection configs live on the VM disk
# (Airbyte's internal Postgres) and are intentionally not in git.
# Deployment-level config like resource limits is a different story:
# losing this on a VM rebuild means re-debugging the OOM that motivated
# it. So this file is the canonical source of truth for the cluster
# shape; `airbyte/README.md` documents how to apply it.

global:
  # Per-job container memory cap. The BigQuery source for "Google Ads
  # iSClinical → HGI Snowflake" OOMs at the chart default after reading
  # ~800 MB across 214 streams (java.lang.OutOfMemoryError: Java heap
  # space). The Hetzner VM has 30 GB total RAM and ~15 GB free, so 8Gi
  # per job is comfortably within budget. Request stays at 2Gi so the
  # scheduler doesn't over-commit when concurrent syncs run.
  #
  # In Airbyte chart v2.1.0 the `mainContainer.memory.{limit,request}`
  # values flow into the JOB_MAIN_CONTAINER_MEMORY_{LIMIT,REQUEST}
  # entries of the airbyte-env configmap (templates/config/_workloads.tpl
  # lines 357-389, 750-751). The workload-launcher reads those from the
  # configmap and applies them as the K8s resource constraints on every
  # connector pod it spawns.
  #
  # Other paths tried and rejected:
  #   - `global.jobs.resources.*` — exists in chart defaults but is not
  #     templated into the configmap; setting it has no effect.
  #   - `global.env_vars.JOB_MAIN_CONTAINER_MEMORY_LIMIT` — collides
  #     with the chart-defined env var that already uses `valueFrom:
  #     configMapKeyRef`, producing an invalid env entry with both
  #     `value:` and `valueFrom:`. The helm upgrade is rejected.
  workloads:
    resources:
      # The chart defaults this to true, which makes Airbyte apply the
      # per-connector resource defaults from the connector registry
      # (e.g. source-bigquery's metadata sets memory=2Gi) and IGNORE
      # the global JOB_MAIN_CONTAINER_MEMORY_LIMIT below. Empirically
      # verified: with this flag at its default, the spawned pod's
      # source container ran at memory=2Gi even after the configmap
      # had JOB_MAIN_CONTAINER_MEMORY_LIMIT=8Gi. Setting it to false
      # makes the global limit apply uniformly across every connector
      # pod the workload-launcher spawns. With 15+ GB free on the VM
      # this is safe even when concurrent syncs run; pod requests stay
      # at 2Gi so the scheduler won't over-commit.
      useConnectorResourceDefaults: false
      mainContainer:
        memory:
          limit: 8Gi
          request: 2Gi
