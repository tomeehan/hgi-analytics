version: 2

models:
  - name: stg_shopify__orders
    description: "Cleaned Shopify orders unioned across all active stores (isClinical, Deese Pro)."
    columns:
      - name: order_id
        description: "Shopify order ID."
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
      - name: email
        description: "Normalised customer email (nullable for guest/partial records)."
      - name: created_at
        tests:
          - not_null
      - name: total_price
        tests:
          - not_null

  - name: stg_shopify__customers
    description: "Cleaned Shopify customers unioned across all active stores (isClinical, Deese Pro)."
    columns:
      - name: customer_id
        description: "Shopify customer ID."
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
      - name: email
        description: "Normalised customer email (nullable for guest/partial records)."

  - name: stg_klaviyo__events
    description: "Klaviyo events unioned across isClinical, Deese Pro, and Harper Grace."
    columns:
      - name: event_id
        description: "Klaviyo event ID."
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
      - name: occurred_at
        tests:
          - not_null

  - name: stg_klaviyo__campaigns
    description: "Klaviyo campaigns unioned across isClinical, Deese Pro, and Harper Grace."
    columns:
      - name: campaign_id
        description: "Klaviyo campaign ID."
        tests:
          - not_null

  - name: stg_klaviyo__campaign_stats
    description: "Pre-aggregated campaign performance stats from Klaviyo Campaign Values Reports."
    columns:
      - name: campaign_id
        description: "Klaviyo campaign ID."
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null

  - name: stg_cin7__sales
    description: "Deduplicated Cin7 sales across all channels (Shopify DTC, B2B, WooCommerce, Amazon UK)."
    columns:
      - name: sale_id
        description: "Cin7 sale ID."
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: ordered_at
        tests:
          - not_null
      - name: channel_group
        tests:
          - not_null

  - name: stg_cin7__customers
    description: "Deduplicated Cin7 customer records."
    columns:
      - name: customer_id
        description: "Cin7 customer ID."
        tests:
          - not_null
          - unique

  - name: stg_cin7__customer_addresses
    description: "Flattened Cin7 customer address records (one row per address per customer)."
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: address_type
        description: "Shipping or Billing."

  - name: stg_shopify__order_line_items
    description: "Flattened Shopify order line items across all stores."
    columns:
      - name: line_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null

  - name: stg_prospect_crm__sales_ledgers
    description: "Prospect CRM customer-account records (both B2C and B2B). Email is the primary cross-source join key."
    columns:
      - name: sales_ledger_id
        description: "Prospect CRM SalesLedgerId — string PK."
        tests:
          - not_null
          - unique
      - name: email
        description: "Lowercased, trimmed customer email; nullable."
      - name: is_b2c
        description: "True for consumer accounts, false for B2B/wholesale (~3,000 ledgers)."

  - name: stg_prospect_crm__contacts
    description: "Prospect CRM individual contacts. KLAVIYOID populated on ~11k rows (Klaviyo bridge)."
    columns:
      - name: contact_id
        tests:
          - not_null
          - unique
      - name: email
        description: "Lowercased, trimmed; nullable."

  - name: stg_prospect_crm__companies
    description: "Prospect CRM companies (typically the parent of B2B ledgers). No FK from sales_ledgers — link is via name."
    columns:
      - name: company_id
        tests:
          - not_null
          - unique

  - name: stg_prospect_crm__leads
    description: "Prospect CRM sales leads with UTM attribution and pipeline state."
    columns:
      - name: lead_id
        tests:
          - not_null
          - unique
      - name: contact_id
        description: "Linked CRM contact; not all leads have one."

  - name: stg_prospect_crm__addresses
    description: "Prospect CRM addresses; FK target for contacts and leads."
    columns:
      - name: address_id
        tests:
          - not_null
          - unique

  - name: stg_prospect_crm__sales_orders
    description: "Prospect CRM sales-order headers (order-level, pre-invoice)."
    columns:
      - name: order_number
        tests:
          - not_null
          - unique
      - name: sales_ledger_id
        tests:
          - not_null
      - name: ordered_at
        tests:
          - not_null

  - name: stg_prospect_crm__sales_invoices
    description: "Prospect CRM sales invoices. SALES_ORDER_HEADERID is a FK to sales_orders."
    columns:
      - name: invoice_number
        tests:
          - not_null
          - unique

  - name: stg_prospect_crm__sales_transactions
    description: "Prospect CRM line-level sales transactions with cost and margin. The richest source of B2B revenue truth."
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: sales_ledger_id
        tests:
          - not_null

  - name: stg_prospect_crm__product_items
    description: "Prospect CRM product/SKU master. Cross-source SKU mapping to Shopify is unreliable — see CLAUDE.md."
    columns:
      - name: product_item_id
        tests:
          - not_null
          - unique

  - name: stg_meta__ads_spend
    description: "Daily Meta ad spend aggregated from BRONZE_META_*.ADS_INSIGHTS, unioned across iS Clinical, Deese PRO, and Revitalash. Purchases / purchase_value extracted from the ACTIONS / ACTION_VALUES JSON arrays where action_type='purchase'."
    columns:
      - name: spend_date
        description: "Activity date (date_start from Meta)."
        tests:
          - not_null
      - name: order_month
        description: "First day of the month spend was recorded (date_trunc month of spend_date). Surfaced so the dashboard's Month filter can target this model the same way it targets fct_orders."
      - name: store_id
        description: "Brand identifier."
        tests:
          - not_null
      - name: spend
        description: "Total Meta ad spend for the day."
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: impressions
      - name: clicks
      - name: purchases
        description: "Sum of ACTIONS where action_type='purchase'."
      - name: purchase_value
        description: "Sum of ACTION_VALUES where action_type='purchase'."

  - name: stg_google_analytics__sessions
    description: "Daily GA4 sessions aggregated from TRAFFIC_ACQUISITION_SESSION_SOURCE_MEDIUM_REPORT (across source/medium). The Bronze DATE column is text in YYYYMMDD format and is cast to a date here."
    columns:
      - name: session_date
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: sessions
      - name: engaged_sessions
      - name: total_revenue
        description: "GA-attributed revenue (purchase events)."

  - name: stg_shopify__order_refunds
    description: "Per-order Shopify refund amounts. Sourced from BRONZE_SHOPIFY_*.ORDER_REFUNDS by LATERAL FLATTEN over the TRANSACTIONS array, summing amount where kind='refund' and status='success'. One row per order with refunds."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
      - name: refund_amount
        description: "Sum of successful refund-transaction amounts for this order."
      - name: last_refunded_at
        description: "Most recent refund timestamp on this order."
