version: 2

sources:
  - name: bronze_shopify_isclinical
    database: HGI
    schema: BRONZE_SHOPIFY_ISCLINICAL
    tables:
      - name: orders
      - name: customers
      - name: order_line_items
      - name: order_refunds
      - name: products
      - name: product_variants

  - name: bronze_meta_isclinical
    database: HGI
    schema: BRONZE_META_ISCLINICAL
    tables:
      - name: ads_insights

  - name: bronze_meta_deese_pro
    database: HGI
    schema: BRONZE_META_DEESE_PRO
    tables:
      - name: ads_insights

  - name: bronze_google_analytics_isclinical
    database: HGI
    schema: BRONZE_GOOGLE_ANALYTICS_ISCLINICAL
    tables:
      - name: traffic_acquisition_session_source_medium_report
      - name: traffic_acquisition_session_default_channel_grouping_report
      - name: events_report
      - name: website_overview

  - name: bronze_google_ads_isclinical
    database: HGI
    schema: BRONZE_GOOGLE_ADS_ISCLINICAL
    tables:
      # Airbyte's Google Ads connector lands the search-query / search-term
      # stream as ADS_SEARCHQUERYSTATS_<ad_account_id>. The 5994178388 suffix
      # is the iS Clinical ad-account id; the P_ADS_* variant is the
      # partitioned table, identical row counts, so we read the unpartitioned
      # ADS_* table directly.
      - name: search_query_stats
        identifier: ADS_SEARCHQUERYSTATS_5994178388

  - name: bronze_klaviyo_isclinical
    database: HGI
    schema: BRONZE_KLAVIYO_ISCLINICAL
    tables:
      - name: events
      - name: campaigns
      - name: campaign_values_reports
      - name: metrics
      - name: profiles

  - name: bronze_klaviyo_deese_pro
    database: HGI
    schema: BRONZE_KLAVIYO_DEESE_PRO
    tables:
      - name: events
      - name: campaigns
      - name: campaign_values_reports
      - name: metrics
      - name: profiles

  - name: bronze_klaviyo_harper_grace
    database: HGI
    schema: BRONZE_KLAVIYO_HARPER_GRACE
    tables:
      - name: events
      - name: campaigns
      - name: campaign_values_reports
      - name: metrics
      - name: profiles

  - name: bronze_shopify_deese_pro
    database: HGI
    schema: BRONZE_SHOPIFY_DEESE_PRO
    tables:
      - name: orders
      - name: customers

  - name: bronze_cin7
    database: HGI
    schema: BRONZE_CIN7
    tables:
      - name: sale_list
      - name: customers
      - name: products
      - name: purchase_list

  - name: bronze_prospect_crm
    database: HGI
    schema: BRONZE_PROSPECT_CRM
    tables:
      - name: contacts
      - name: companies
      - name: sales_ledgers
      - name: leads
      - name: sales_transactions
      - name: product_items
      - name: addresses
      - name: sales_order_headers
      - name: sales_invoice_headers
