  - name: fct_ga_source_medium
    description: "GA4 traffic fact at session_date x store_id x source/medium grain. Pass-through over stg_google_analytics__source_medium (mirrors how fct_ga_sessions wraps stg_google_analytics__sessions). Powers the KPI Report's 'Top traffic sources by sessions' table (PDF p.13) and is reused by the converting-sources and PR-referrer tiles. No transactions column: the source/medium Bronze report has no purchase-event count and no GA4 events report carries the source/medium dimension. Currently iS Clinical only."
