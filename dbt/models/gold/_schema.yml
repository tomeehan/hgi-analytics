  - name: fct_marketing_kpis_daily
    description: "Daily marketing KPIs for isClinical: revenue, orders, ad spend, sessions, plus blended ROAS / CAC / conversion-rate. Each metric is declared twice — *_l30d (last 30 days) and *_p30d (prior 30 days, i.e. 30-60 days ago) — so Big Number tiles render headline + previous-period comparison via the chart's selectedField + comparisonField. Period windows are baked into each metric's SQL via `case when date >= current_date - 30`, so charts don't need a date filter."
    meta:
      label: "Marketing KPIs Daily"
    columns:
      - name: date
        description: "Activity date."
        tests: [not_null]
      - name: store_id
        description: "Brand identifier."
        tests: [not_null]
      - name: gross_sales
        description: "Sum of total_price for the day."
        meta:
          metrics:
            gross_sales_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.gross_sales else 0 end)"
              label: "Gross Sales (L30D)"
              format: "gbp"
              round: 0
            gross_sales_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.gross_sales else 0 end)"
              label: "Gross Sales (Prev 30D)"
              format: "gbp"
              round: 0
      - name: net_sales
        description: "Gross sales minus refunds."
        meta:
          metrics:
            net_sales_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.net_sales else 0 end)"
              label: "Net Sales (L30D)"
              format: "gbp"
              round: 0
            net_sales_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.net_sales else 0 end)"
              label: "Net Sales (Prev 30D)"
              format: "gbp"
              round: 0
      - name: orders
        description: "Distinct order count for the day."
        meta:
          metrics:
            orders_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.orders else 0 end)"
              label: "Total Orders (L30D)"
              round: 0
            orders_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.orders else 0 end)"
              label: "Total Orders (Prev 30D)"
              round: 0
      - name: new_customer_orders
        description: "Orders where the customer's first-ever order was on this date (is_first_order=1)."
        meta:
          metrics:
            new_customer_pct_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.new_customer_orders else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.orders else 0 end), 0)"
              label: "New Customer % (L30D)"
              format: "percent"
              round: 1
            new_customer_pct_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.new_customer_orders else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.orders else 0 end), 0)"
              label: "New Customer % (Prev 30D)"
              format: "percent"
              round: 1
      - name: ad_spend
        description: "Meta ad spend for the day. Google Ads is modelled separately by fct_google_ads_search_terms (search-term grain) and is not folded into this Meta-only daily-spend fact."
        meta:
          metrics:
            ad_spend_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.ad_spend else 0 end)"
              label: "Ad Spend (L30D)"
              format: "gbp"
              round: 0
            ad_spend_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.ad_spend else 0 end)"
              label: "Ad Spend (Prev 30D)"
              format: "gbp"
              round: 0
            blended_roas_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.net_sales else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.ad_spend else 0 end), 0)"
              label: "Blended ROAS MER (L30D)"
              round: 2
            blended_roas_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.net_sales else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.ad_spend else 0 end), 0)"
              label: "Blended ROAS MER (Prev 30D)"
              round: 2
            blended_cac_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.ad_spend else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.new_customer_orders else 0 end), 0)"
              label: "Blended CAC (L30D)"
              format: "gbp"
              round: 0
            blended_cac_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.ad_spend else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.new_customer_orders else 0 end), 0)"
              label: "Blended CAC (Prev 30D)"
              format: "gbp"
              round: 0
      - name: sessions
        description: "GA4 sessions for the day."
        meta:
          metrics:
            sessions_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.sessions else 0 end)"
              label: "Sessions (L30D)"
              round: 0
            sessions_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.sessions else 0 end)"
              label: "Sessions (Prev 30D)"
              round: 0
            conversion_rate_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.orders else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.sessions else 0 end), 0)"
              label: "Shopify Conversion Rate (L30D)"
              format: "percent"
              round: 2
            conversion_rate_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.orders else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.sessions else 0 end), 0)"
              label: "Shopify Conversion Rate (Prev 30D)"
              format: "percent"
              round: 2
            aov_l30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.net_sales else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 30 then ${TABLE}.orders else 0 end), 0)"
              label: "Average Order Value (L30D)"
              format: "gbp"
              round: 2
            aov_p30d:
              type: number
              sql: "sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.net_sales else 0 end)::float / nullif(sum(case when ${TABLE}.date >= current_date - 60 and ${TABLE}.date < current_date - 30 then ${TABLE}.orders else 0 end), 0)"
              label: "Average Order Value (Prev 30D)"
              format: "gbp"
              round: 2

  - name: fct_google_ads_search_terms
    description: >-
      iS Clinical Google Ads search-term performance, aggregated to one row
      per (order_month, brand_intent). Backs the KPI Report's "Paid search /
      shopping" tile (PDF page 15: GOOGLE ADS, BRANDED VS NON-BRANDED).
      Sourced from BRONZE_GOOGLE_ADS_ISCLINICAL.ADS_SEARCHQUERYSTATS_5994178388
      via stg_google_ads__search_terms. The PDF panel is a "search term raw
      report" scoped to the top 100 search terms by cost for the month; this
      model reproduces that scope (top-100-by-cost per month) before
      aggregating. brand_intent splits the terms into branded / non_branded
      from the search-term text. Coverage note: Google Ads' search-term view
      only retains terms above a minimum impression threshold, so Bronze
      holds fewer search terms than the PDF's report was generated from
      (Bronze April 2026 search-query spend ~£2,556 vs the PDF panel's
      £5,076 top-100 total), so the live tile reads below the PDF panel.
    meta:
      label: "Google Ads Search Terms"
    columns:
      - name: order_month
        description: "First day of the month the search terms were recorded (date_trunc month of search_date)."
        tests:
          - not_null
        meta:
          dimension:
            label: "Month (date)"
          additional_dimensions:
            # Mirrors fct_orders.order_month_label so the KPI Report's Month
            # filter (on fct_orders_order_month_label) cross-applies to this
            # tile via Lightdash's "same field name" lookup. See CLAUDE.md ->
            # "Group dashboard filter convention".
            order_month_label:
              type: string
              label: "Month"
              description: "Compact YYYY-MM label for the dashboard Month filter."
              sql: "to_char(${TABLE}.order_month, 'YYYY-MM')"
      - name: order_month_label
        description: "Compact YYYY-MM label for the dashboard Month filter."
        tests:
          - not_null
      - name: store_id
        description: "Brand identifier (constant 'isclinical')."
        tests:
          - not_null
      - name: brand_intent
        description: "Brand-intent classification derived from the search-term text (branded / non_branded). Not a native Google Ads field. See CLAUDE.md -> Google Ads brand_intent classification."
        tests:
          - not_null
          - accepted_values:
              values: ['branded', 'non_branded']
        meta:
          dimension:
            label: "Type"
            # Human-readable display labels for the branded-vs-non-branded
            # table on the KPI Report (PDF page 15).
            sql: "case ${TABLE}.brand_intent when 'branded' then 'Branded' when 'non_branded' then 'Non-branded' else ${TABLE}.brand_intent end"
      - name: clicks
        description: "Sum of Google Ads clicks for the (month, brand_intent), within the top-100-by-cost scope."
        meta:
          metrics:
            total_clicks:
              type: sum
              label: "Clicks"
              round: 0
      - name: cost
        description: "Google Ads cost in GBP for the (month, brand_intent), within the top-100-by-cost scope."
        meta:
          metrics:
            total_cost:
              type: sum
              label: "Cost"
              format: "gbp"
              round: 0
      - name: conversions
        description: "Sum of Google Ads conversions for the (month, brand_intent), within the top-100-by-cost scope."
        meta:
          metrics:
            total_conversions:
              type: sum
              label: "Conversions"
              round: 0
