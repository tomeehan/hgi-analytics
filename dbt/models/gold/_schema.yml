version: 2

models:
  - name: fct_orders
    description: "Shopify orders fact table with first-order flag and monthly grain."
    meta:
      label: "Orders"
    columns:
      - name: order_id
        description: "Shopify order ID."
        tests:
          - not_null
          - unique
        meta:
          metrics:
            order_count:
              type: count_distinct
              label: "Order Count"
              round: 0
      - name: store_id
        description: "Brand identifier."
        tests:
          - not_null
        meta:
          dimension:
            label: "Brand"
            # Display the human-readable brand name. Filters operate on the
            # transformed value (e.g. "iS Clinical"), not the raw `store_id`.
            # Keep this CASE in sync with the brand list in CLAUDE.md
            # "Conventions" > store-name display mapping.
            sql: "case ${TABLE}.store_id when 'isclinical' then 'iS Clinical' when 'deese_pro' then 'Deese PRO' when 'geske' then 'Geske' else ${TABLE}.store_id end"
      - name: total_price
        description: "Total order value in the order's currency."
        meta:
          metrics:
            total_revenue:
              type: sum
              label: "Total Revenue"
              format: "gbp"
              round: 0
            aov:
              type: average
              label: "Avg Order Value"
              format: "gbp"
              round: 0
      - name: net_sales
        description: "total_price minus refunded amount (sum of successful refund transactions)."
        meta:
          metrics:
            total_net_sales:
              type: sum
              label: "Net Sales"
              format: "gbp"
              round: 0
      - name: refund_amount
        description: "Refunded amount on this order (0 if no refunds). Sourced from BRONZE_SHOPIFY_*.ORDER_REFUNDS via stg_shopify__order_refunds."
        meta:
          metrics:
            total_refunds:
              type: sum
              label: "Refunds"
              format: "gbp"
              round: 0
      - name: is_first_order
        description: "True if this is the customer's first order."
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
        meta:
          additional_dimensions:
            # New vs returning split for the Customer Mix & AOV Split table
            # tile on the iS Clinical KPI Report (PDF p.14). A "new customer"
            # order is the customer's first ever order (is_first_order = 1);
            # everything else is "Returning customers".
            customer_type:
              type: string
              label: "Customer Type"
              description: "New vs returning customer, derived from is_first_order."
              sql: "case when ${TABLE}.is_first_order = 1 then 'New customers' else 'Returning customers' end"
          metrics:
            new_customer_orders:
              type: sum
              label: "New Customer Orders"
              round: 0
            returning_customer_orders:
              type: sum
              label: "Returning Customer Orders"
              # is_first_order is an integer 0/1 (see CLAUDE.md): returning =
              # the inverse flag. Mirrors new_customer_orders.
              sql: "case when ${TABLE}.is_first_order = 0 then 1 else 0 end"
              round: 0
            new_customer_share:
              type: average
              label: "New Customer Share"
              # Average of the 0/1 is_first_order flag is the new-order
              # fraction. format: percent renders it as a percentage in
              # Lightdash (e.g. 0.408 -> 41%). Powers the Customer Mix
              # KPI-strip tile on the iS Clinical KPI Report.
              format: "percent"
              round: 0
      - name: order_month
        description: "Month the order was placed (first day of month)."
        meta:
          dimension:
            label: "Month (date)"
            # Stays a DATE for charts using relative-date operators (inThePast,
            # inBetween — e.g. "This vs Last Month"). Don't surface this one in
            # human-facing dashboard filters because Lightdash forces a date
            # picker UI rather than a dropdown for DATE columns.
          additional_dimensions:
            # Human-facing single-Month dashboard filter.
            # Encoded as a string "YYYY-MM" because Lightdash sorts string
            # filter dropdowns alphabetically (verified in
            # fieldValuesQueryBuilder.js: hardcoded ORDER BY <field> ASC).
            # "YYYY-MM" is the only encoding that's simultaneously
            #   (a) a string (so we get a dropdown, not a date-picker),
            #   (b) lex-sorted == chronological,
            #   (c) compact (7 chars), and
            #   (d) unambiguous about the month.
            # The full "April 2026" form would force alphabetical sort
            # ("April 2024 / April 2025 / August 2024 / ..."); the
            # "YYYY-MM (April)" hybrid was rejected as too noisy.
            order_month_label:
              type: string
              label: "Month"
              description: "Compact YYYY-MM label for human-facing dashboard month filters."
              sql: "to_char(${TABLE}.order_month, 'YYYY-MM')"
      - name: email
        description: "Normalised customer email."
      - name: customer_id
        description: "Shopify customer ID."
      - name: created_at
        description: "Order creation timestamp."
      - name: financial_status
        description: "Payment status (paid, pending, refunded, etc.)."
      - name: fulfillment_status
        description: "Fulfillment status (fulfilled, partial, null)."
      - name: currency
        description: "ISO currency code for the order."

  - name: dim_customers
    description: "Shopify customer dimension enriched with lifetime order stats."
    meta:
      label: "Customers"
    columns:
      - name: customer_id
        description: "Shopify customer ID."
        tests:
          - not_null
          - unique
        meta:
          metrics:
            customer_count:
              type: count_distinct
              label: "Customer Count"
              round: 0
      - name: store_id
        tests:
          - not_null
      - name: lifetime_revenue
        description: "Sum of all order totals for this customer."
        meta:
          metrics:
            total_customer_revenue:
              type: sum
              label: "Total Customer Revenue"
              format: "gbp"
              round: 0
      - name: lifetime_orders
        description: "Number of orders placed by this customer."
        meta:
          metrics:
            avg_orders_per_customer:
              type: average
              label: "Avg Orders per Customer"
              round: 1

  - name: fct_campaign_performance
    description: "Klaviyo campaign performance stats (opens, clicks, revenue) across all brands."
    meta:
      label: "Campaign Performance"
    columns:
      - name: campaign_id
        description: "Klaviyo campaign ID."
        tests:
          - not_null
        meta:
          metrics:
            campaign_count:
              type: count_distinct
              label: "Campaigns Sent"
              round: 0
      - name: store_id
        description: "Brand identifier."
        tests:
          - not_null
      - name: delivered
        description: "Emails delivered."
        meta:
          metrics:
            total_delivered:
              type: sum
              label: "Emails Delivered"
              round: 0
      - name: opens
        description: "Total email opens."
        meta:
          metrics:
            total_opens:
              type: sum
              label: "Total Opens"
              round: 0
      - name: unique_opens
        description: "Unique email opens."
        meta:
          metrics:
            total_unique_opens:
              type: sum
              label: "Unique Opens"
              round: 0
      - name: clicks
        description: "Total email clicks."
        meta:
          metrics:
            total_clicks:
              type: sum
              label: "Total Clicks"
              round: 0
      - name: unique_clicks
        description: "Unique email clicks."
        meta:
          metrics:
            total_unique_clicks:
              type: sum
              label: "Unique Clicks"
              round: 0
      - name: revenue
        description: "Revenue attributed to this campaign."
        meta:
          metrics:
            total_attributed_revenue:
              type: sum
              label: "Attributed Revenue"
              format: "gbp"
              round: 0
      - name: unsubscribed
        description: "Unsubscribes resulting from this campaign."
        meta:
          metrics:
            total_unsubscribes:
              type: sum
              label: "Unsubscribes"
              round: 0
      - name: open_rate
        description: "Unique opens / delivered (fraction 0-1)."
        meta:
          metrics:
            avg_open_rate:
              type: average
              label: "Avg Open Rate"
              format: "percent"
              round: 1
      - name: click_rate
        description: "Unique clicks / delivered (fraction 0-1)."
        meta:
          metrics:
            avg_click_rate:
              type: average
              label: "Avg Click Rate"
              format: "percent"
              round: 1
      - name: campaign_name
        description: "Campaign name."
      - name: send_time
        description: "When the campaign was sent."
      - name: send_month
        description: "Month the campaign was sent (first day of month)."

  - name: dim_campaigns
    description: "Klaviyo email campaigns across all brands."
    meta:
      label: "Campaigns"
    columns:
      - name: campaign_id
        description: "Klaviyo campaign ID."
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
      - name: campaign_name
        description: "Campaign name."
      - name: status
        description: "Campaign status (Sent, Draft, Scheduled, etc.)."
      - name: send_time
        description: "When the campaign was sent."

  - name: fct_cin7_sales
    description: "Cin7 sales fact table across all channels, with first-order flag and monthly grain."
    meta:
      label: "Cin7 Sales"
    columns:
      - name: sale_id
        description: "Cin7 sale ID."
        tests:
          - not_null
          - unique
        meta:
          metrics:
            order_count:
              type: count_distinct
              label: "Orders"
              round: 0
      - name: customer_id
        description: "Cin7 customer ID."
        tests:
          - not_null
        meta:
          metrics:
            active_customers:
              type: count_distinct
              label: "Active Customers"
              round: 0
      - name: paid_amount
        description: "Amount paid for the sale (GBP base currency)."
        meta:
          metrics:
            total_revenue:
              type: sum
              label: "Revenue"
              format: "gbp"
              round: 0
            aov:
              type: average
              label: "Avg Order Value"
              format: "gbp"
              round: 0
      - name: is_first_order
        description: "True if this is the customer's first ever Cin7 sale."
        meta:
          metrics:
            new_customer_orders:
              type: sum
              label: "New Customer Orders"
              round: 0
      - name: channel_group
        description: "Grouped channel: shopify_dtc, b2b, woocommerce, amazon_uk, other."
      - name: source_channel
        description: "Raw Cin7 source channel value."
      - name: order_month
        description: "Month the order was placed (first day of month)."
      - name: ordered_at
        description: "Order timestamp."
      - name: customer_order_number
        description: "This customer's Nth order overall."
      - name: status
        description: "Cin7 sale status."
      - name: shipping_city
        description: "Shipping city from the customer's default shipping address."
      - name: shipping_country
        description: "Shipping country from the customer's default shipping address."
      - name: shipping_postcode
        description: "Shipping postcode from the customer's default shipping address."
      - name: postcode_area
        description: "UK postcode area (letters before the digits)."
      - name: uk_region
        description: "UK region derived from the shipping postcode area; 'International' for non-UK."

  - name: dim_cin7_customers
    description: "Cin7 customer dimension enriched with lifetime order stats and segment."
    meta:
      label: "Cin7 Customers"
    columns:
      - name: customer_id
        description: "Cin7 customer ID."
        tests:
          - not_null
          - unique
        meta:
          metrics:
            customer_count:
              type: count_distinct
              label: "Customers"
              round: 0
      - name: customer_name
        description: "Customer name from Cin7."
        meta:
          label: "Customer Name"
      - name: email
        description: "Default contact email from Cin7 CONTACTS JSON (lowercased, trimmed)."
        meta:
          label: "Email"
      - name: lifetime_revenue
        description: "Sum of all paid amounts for this customer."
        meta:
          metrics:
            total_customer_ltv:
              type: sum
              label: "Total Customer LTV"
              format: "gbp"
              round: 0
            avg_ltv:
              type: average
              label: "Avg LTV"
              format: "gbp"
              round: 0
      - name: lifetime_orders
        description: "Total number of orders placed by this customer."
        meta:
          metrics:
            avg_orders_per_customer:
              type: average
              label: "Avg Orders per Customer"
              round: 1
      - name: customer_segment
        description: "no_orders / one_time / occasional (2-4 orders) / loyal (5+)."
      - name: channels_used
        description: "Number of distinct channel groups this customer has ordered through."
      - name: first_order_at
        description: "Timestamp of customer's first ever order."
      - name: last_order_at
        description: "Timestamp of customer's most recent order."

  - name: fct_product_sales
    description: "Shopify order line items joined to order context — one row per line item."
    meta:
      label: "Product Sales"
    columns:
      - name: line_item_id
        description: "Shopify line item ID."
        tests:
          - not_null
          - unique
        meta:
          metrics:
            line_item_count:
              type: count_distinct
              label: "Line Items"
              round: 0
      - name: order_id
        meta:
          metrics:
            order_count:
              type: count_distinct
              label: "Orders"
              round: 0
      - name: customer_id
        meta:
          metrics:
            unique_buyers:
              type: count_distinct
              label: "Unique Buyers"
              round: 0
      - name: quantity
        meta:
          metrics:
            units_sold:
              type: sum
              label: "Units Sold"
              round: 0
      - name: line_revenue_gbp
        description: "quantity × unit_price_gbp."
        meta:
          metrics:
            product_revenue:
              type: sum
              label: "Product Revenue"
              format: "gbp"
              round: 0
            avg_unit_price:
              type: average
              label: "Avg Unit Price"
              format: "gbp"
              round: 2
      - name: product_title
        description: "Product name."
      - name: sku
        description: "Product SKU."
      - name: store_id
        description: "Brand identifier."
      - name: order_month
        description: "Month the order was placed."
      - name: uk_region
        description: "UK region derived from shipping postcode."
      - name: is_first_order
        description: "True if this line item belongs to the customer's first order."

  - name: fct_product_pairs
    description: "Cross-sell pairs — products bought together in the same Shopify order."
    meta:
      label: "Product Pairs (Cross-sell)"
    columns:
      - name: product_a
        description: "First product in the pair (alphabetically lower product_id)."
      - name: product_b
        description: "Second product in the pair."
      - name: orders_together
        description: "Number of distinct orders containing both products."
        meta:
          metrics:
            times_bought_together:
              type: sum
              label: "Times Bought Together"
              round: 0

  - name: fct_product_repeat_rate
    description: "Per-product repeat purchase rate — how many buyers came back for the same product. Grain: product_id × store_id."
    meta:
      label: "Product Repeat Rate"
    columns:
      - name: product_id
        tests:
          - not_null
      - name: store_id
        description: "Brand identifier — the Shopify store this row's repeat rate is computed against."
        tests:
          - not_null
        meta:
          label: "Store"
      - name: product_title
        description: "Product name."
      - name: unique_buyers
        description: "Distinct customers who bought this product."
        meta:
          metrics:
            total_buyers:
              type: sum
              label: "Total Buyers"
              round: 0
      - name: repeat_buyers
        description: "Buyers who purchased this product more than once."
        meta:
          metrics:
            total_repeat_buyers:
              type: sum
              label: "Repeat Buyers"
              round: 0
      - name: repeat_rate_pct
        description: "% of buyers who repurchased (repeat_buyers / unique_buyers × 100). Already a percentage, do not apply percent format."
        meta:
          metrics:
            avg_repeat_rate:
              type: average
              label: "Avg Repeat Rate %"
              round: 1

  - name: dim_customer_unified
    description: "One row per email (lowered, trimmed) — the cross-source customer 360, unioning Prospect CRM ledgers, CRM contacts, and Shopify customers across both stores."
    meta:
      label: "Unified Customers"
    columns:
      - name: email
        description: "Lowercased, trimmed email — primary key."
        tests:
          - not_null
          - unique
        meta:
          metrics:
            customer_count:
              type: count_distinct
              label: "Customers"
              round: 0
      - name: display_name
        description: "Best available customer name (CRM ledger name, or contact full name, or Shopify first/last)."
        meta:
          label: "Customer Name"
      - name: country
        description: "Country from the CRM ledger (nullable for Shopify-only customers)."
      - name: customer_universe
        description: "Where this customer is seen: crm_only, crm_and_shopify, shopify_isclinical_only, shopify_deese_pro_only, both_shopify_stores."
        meta:
          label: "Customer Universe"
      - name: seen_in_crm
        description: "'b2b' if CRM ledger is_b2c=false, 'b2c' if true, null if not in CRM."
        meta:
          label: "CRM Status"
      - name: seen_in_shopify_isclinical
        description: "True if this email exists in the Shopify isClinical store."
        meta:
          label: "Shops on isClinical"
      - name: seen_in_shopify_deese_pro
        description: "True if this email exists in the Shopify Deese Pro store."
        meta:
          label: "Shops on Deese Pro"
      - name: crm_sales_ledger_id
      - name: crm_contact_id
      - name: klaviyo_id
        description: "Klaviyo profile id, populated on ~11k contacts."
      - name: crm_balance
      - name: crm_credit_limit
      - name: crm_last_invoice_at
      - name: shopify_isclinical_total_spent
        description: "Lifetime Shopify isClinical spend for this email."
        meta:
          metrics:
            total_isclinical_spend:
              type: sum
              label: "Shopify isClinical Spend"
              format: "gbp"
              round: 0
      - name: shopify_isclinical_orders_count
        meta:
          label: "isClinical Orders"
      - name: shopify_deese_pro_total_spent
        meta:
          metrics:
            total_deese_pro_spend:
              type: sum
              label: "Shopify Deese Pro Spend"
              format: "gbp"
              round: 0
      - name: shopify_deese_pro_orders_count
        meta:
          label: "Deese Pro Orders"
      - name: total_shopify_spend
        description: "Sum of Shopify spend across both stores."
        meta:
          metrics:
            total_dtc_spend:
              type: sum
              label: "Total DTC Spend"
              format: "gbp"
              round: 0
            avg_dtc_spend_per_customer:
              type: average
              label: "Avg DTC Spend"
              format: "gbp"
              round: 0
      - name: total_shopify_orders
        meta:
          metrics:
            total_dtc_orders:
              type: sum
              label: "Total DTC Orders"
              round: 0
      - name: accepts_marketing
        description: "True if customer accepts marketing on either Shopify store."
        meta:
          label: "Accepts Marketing"
      - name: email_domain
        description: "Domain part of the email (after the '@'). Used to spot fleet/business buyers."
        meta:
          label: "Email Domain"
      - name: is_likely_business_email
        description: "True if email_domain is not a known consumer provider (gmail/yahoo/etc.) and not a spam-pattern TLD (.fun, .in.net). Imperfect proxy for 'this email looks business-y'."
        meta:
          label: "Business Email Domain"
      - name: is_dtc_b2b_lead
        description: "True if the customer is a 'DTC → B2B lead': has a business-looking email, has actually bought on a Shopify DTC store, and isn't yet in Prospect CRM. Targets these for B2B outreach."
        meta:
          label: "Likely DTC to B2B Lead"

  - name: fct_b2b_sales
    description: "Line-level B2B sales from Prospect CRM (filtered to ledgers where is_b2c=false), enriched with product and order context. The richest B2B revenue/margin truth in the warehouse."
    meta:
      label: "B2B Sales"
    columns:
      - name: transaction_id
        description: "Prospect CRM transaction line ID — primary key."
        tests:
          - not_null
          - unique
        meta:
          metrics:
            b2b_line_count:
              type: count_distinct
              label: "B2B Line Items"
              round: 0
      - name: sales_ledger_id
        description: "B2B customer (CRM SalesLedgerId)."
        tests:
          - not_null
        meta:
          metrics:
            b2b_active_customers:
              type: count_distinct
              label: "B2B Active Customers"
              round: 0
      - name: order_number
        description: "Prospect CRM sales-order number."
        meta:
          metrics:
            b2b_order_count:
              type: count_distinct
              label: "B2B Orders"
              round: 0
      - name: customer_name
        description: "Customer (account) name from the CRM ledger."
        meta:
          label: "Customer"
      - name: country
        description: "Country from the CRM ledger."
      # B2B revenue / cost / margin are multi-currency (see currency_code on
      # this table). No GBP format applied — would mislabel non-GBP rows.
      # Currency normalisation deferred per CLAUDE.md.
      - name: line_value
        description: "Line revenue (currency = currency_code)."
        meta:
          metrics:
            b2b_revenue:
              type: sum
              label: "B2B Revenue"
              round: 0
            b2b_aov:
              type: average
              label: "B2B AOV"
              round: 0
      - name: cost_value
        description: "Line cost."
        meta:
          metrics:
            b2b_cost:
              type: sum
              label: "B2B Cost"
              round: 0
      - name: margin_value
        description: "Line margin (line_value - cost_value)."
        meta:
          metrics:
            b2b_margin:
              type: sum
              label: "B2B Margin"
              round: 0
      - name: margin_percent
        description: "Per-line margin % (already × 100, e.g. 23.5 means 23.5%)."
        meta:
          metrics:
            avg_margin_pct:
              type: average
              label: "Avg Margin %"
              round: 1
      - name: qty_invoiced
        meta:
          metrics:
            b2b_units:
              type: sum
              label: "B2B Units"
              round: 0
      - name: currency_code
        description: "Line currency. Multi-currency — currency normalisation deferred."
      - name: sku
        description: "Product SKU from CRM PRODUCT_ITEMS."
      - name: product_description
        description: "Human-readable product name (e.g. 'Cleansing Complex 180ml')."
      - name: manufacturer
      - name: category_id
        description: "CRM product category id (free text)."
      - name: product_family_id
      - name: product_type
      - name: ordered_at
        description: "Order timestamp (preferring SALES_ORDER_HEADERS, falling back to transaction)."
      - name: order_month
        description: "First day of the order month."
      - name: transacted_at
      - name: invoiced_at
      - name: warehouse_code
      - name: platform
      - name: source_channel
      - name: order_status
      - name: delivery_country
      - name: delivery_postcode

  - name: fct_ad_spend
    description: "Daily Meta ad spend by store_id and audience_type (one row per spend_date × store_id × audience_type), unioned across iS Clinical and Deese PRO. Sourced from BRONZE_META_*.ADS_INSIGHTS aggregated to daily; purchases / purchase_value are extracted from the ACTIONS / ACTION_VALUES JSON arrays where action_type='purchase'. audience_type splits spend into remarketing / acquisition / other from the Meta campaign / ad-set naming convention."
    meta:
      label: "Ad Spend"
    columns:
      - name: spend_date
        description: "Activity date."
        tests: [not_null]
      - name: order_month
        description: "First day of the month spend was recorded (date_trunc month of spend_date). Mirrors fct_orders.order_month so the dashboard Month filter cross-applies."
        meta:
          dimension:
            label: "Month (date)"
          additional_dimensions:
            # Mirrors fct_orders.order_month_label so the KPI Report's Month
            # filter (on fct_orders_order_month_label) cross-applies to
            # Meta-spend tiles via Lightdash's "same field name" lookup. See
            # CLAUDE.md → "Group dashboard filter convention".
            order_month_label:
              type: string
              label: "Month"
              description: "Compact YYYY-MM label for human-facing dashboard month filters."
              sql: "to_char(${TABLE}.order_month, 'YYYY-MM')"
      - name: store_id
        description: "Brand identifier."
        tests: [not_null]
        meta:
          dimension:
            label: "Brand"
            # Same human-readable rename as fct_orders.store_id (per ticket 001
            # and CLAUDE.md → store-name display mapping). Keep in sync.
            sql: "case ${TABLE}.store_id when 'isclinical' then 'iS Clinical' when 'deese_pro' then 'Deese PRO' when 'geske' then 'Geske' else ${TABLE}.store_id end"
      - name: audience_type
        description: "Audience-type classification derived from the Meta campaign / ad-set naming convention (remarketing / acquisition / other). Not a native Meta field. See CLAUDE.md → Meta audience-type classification."
        tests:
          - not_null
          - accepted_values:
              values: ['remarketing', 'acquisition', 'other']
        meta:
          dimension:
            label: "Audience Type"
            # Human-readable display labels for the remarketing-vs-acquisition
            # table on the KPI Report (PDF page 15).
            sql: "case ${TABLE}.audience_type when 'remarketing' then 'Remarketing' when 'acquisition' then 'Acquisition' when 'other' then 'Other' else ${TABLE}.audience_type end"
      - name: spend
        description: "Total Meta ad spend."
        meta:
          metrics:
            total_meta_spend:
              type: sum
              label: "Meta Ad Spend"
              format: "gbp"
              round: 0
      - name: impressions
        meta:
          metrics:
            total_impressions:
              type: sum
              label: "Impressions"
              round: 0
      - name: clicks
        meta:
          metrics:
            total_meta_clicks:
              type: sum
              label: "Meta Clicks"
              round: 0
      - name: purchases
        description: "Meta-attributed purchases (sum of ACTIONS where action_type='purchase')."
        meta:
          metrics:
            total_meta_purchases:
              type: sum
              label: "Meta Purchases"
              round: 0
      - name: purchase_value
        description: "Meta-attributed purchase value (sum of ACTION_VALUES where action_type='purchase')."
        meta:
          metrics:
            total_meta_purchase_value:
              type: sum
              label: "Meta Purchase Value"
              format: "gbp"
              round: 0
            total_meta_revenue:
              type: sum
              label: "Meta Revenue"
              format: "gbp"
              round: 0

  - name: fct_klaviyo_revenue
    description: >-
      Klaviyo Placed Order revenue attributed to a campaign or a flow via a
      5-day-window engagement join. Grain: one row per attributed (deduplicated)
      Placed Order event. Built from raw BRONZE_KLAVIYO_*.EVENTS: each deduped
      Placed Order is matched to that profile's most recent Opened/Clicked Email
      engagement in the 5 days before the order, and inherits its campaign or
      flow. Orders with no qualifying engagement in-window are excluded. Both
      campaign-attributed and flow-attributed rows are kept; sum(revenue)
      reproduces the PDF's 'TOTAL CRM REVENUE' figure. This reconstructs
      Klaviyo's native attribution from raw events (the pre-aggregated
      *_values_reports streams are not synced), so a few-percent residual gap
      against Klaviyo's own engine is expected.
    meta:
      label: "Klaviyo Revenue"
    columns:
      - name: event_id
        description: "Klaviyo event ID (one per attributed Placed Order)."
        tests:
          - not_null
          - unique
      - name: store_id
        description: "Brand identifier."
        tests:
          - not_null
        meta:
          dimension:
            label: "Brand"
            # Keep in sync with fct_orders.store_id and fct_ad_spend.store_id
            # (CLAUDE.md → store-name display mapping).
            sql: "case ${TABLE}.store_id when 'isclinical' then 'iS Clinical' when 'deese_pro' then 'Deese PRO' when 'harper_grace' then 'Harper Grace' when 'geske' then 'Geske' else ${TABLE}.store_id end"
      - name: order_month
        description: "First day of the month the Placed Order event occurred (date_trunc month of occurred_at). Mirrors fct_orders.order_month so the dashboard's Month filter cross-applies."
        tests:
          - not_null
        meta:
          dimension:
            label: "Month (date)"
          additional_dimensions:
            order_month_label:
              type: string
              label: "Month"
              description: "Compact YYYY-MM label for human-facing dashboard month filters; mirrors fct_orders.order_month_label so the KPI Report's Month filter cross-applies via field-name lookup."
              sql: "to_char(${TABLE}.order_month, 'YYYY-MM')"
      - name: occurred_at
        description: "Timestamp of the Placed Order event."
      - name: revenue
        description: "Order value attributed to Klaviyo (5-day window)."
        meta:
          metrics:
            total_klaviyo_revenue:
              type: sum
              label: "Klaviyo Revenue"
              format: "gbp"
              round: 0
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: attribution_kind
        description: "campaign or flow."
      - name: campaign_id
        description: "Klaviyo campaign ID, null for flow-attributed events."
      - name: flow_id
        description: "Klaviyo flow ID, null for campaign-attributed events."

  - name: fct_ga_sessions
    description: "Daily GA4 traffic-and-conversion fact by store_id (one row per session_date × store_id). Sessions and GA-attributed revenue from BRONZE_GOOGLE_ANALYTICS_*.TRAFFIC_ACQUISITION_SESSION_SOURCE_MEDIUM_REPORT; users from WEBSITE_OVERVIEW; transactions from the EVENTS_REPORT purchase event count. Exposes derived CVR / RPS / AOV metrics. Currently iS Clinical only; Deese PRO / HGI GA4 connections not yet landed."
    meta:
      label: "GA Sessions"
      metrics:
        ga_conversion_rate:
          type: number
          label: "GA Conversion Rate"
          description: "GA4 transactions divided by GA4 sessions, expressed as a percentage."
          sql: "${total_ga_transactions} / nullif(${total_ga_sessions}, 0)"
          format: "percent"
          round: 2
        ga_revenue_per_session:
          type: number
          label: "GA Revenue per Session"
          description: "GA-attributed revenue divided by GA4 sessions."
          sql: "${ga_total_revenue} / nullif(${total_ga_sessions}, 0)"
          format: "gbp"
          round: 2
        ga_aov:
          type: number
          label: "GA AOV"
          description: "GA-derived average order value: GA-attributed revenue divided by GA4 transactions. Deliberately distinct from the Shopify source-of-truth AOV because GA's transaction count and revenue differ from Shopify's."
          sql: "${ga_total_revenue} / nullif(${total_ga_transactions}, 0)"
          format: "gbp"
          round: 2
    columns:
      - name: session_date
        tests: [not_null]
      - name: order_month
        description: "First day of the month of session_date (date_trunc month). Mirrors fct_orders.order_month so the dashboard Month filter cross-applies."
        tests: [not_null]
        meta:
          dimension:
            label: "Month (date)"
          additional_dimensions:
            order_month_label:
              type: string
              label: "Month"
              description: "Compact YYYY-MM label for the dashboard's Month filter; mirrors fct_orders.order_month_label so the KPI Report's Month filter cross-applies via field-name lookup."
              sql: "to_char(${TABLE}.order_month, 'YYYY-MM')"
      - name: store_id
        description: "Brand identifier."
        tests: [not_null]
        meta:
          dimension:
            label: "Brand"
            # Same human-readable rename as fct_orders.store_id (CLAUDE.md →
            # store-name display mapping). Keep in sync across Gold models.
            sql: "case ${TABLE}.store_id when 'isclinical' then 'iS Clinical' when 'deese_pro' then 'Deese PRO' when 'geske' then 'Geske' else ${TABLE}.store_id end"
      - name: sessions
        meta:
          metrics:
            total_ga_sessions:
              type: sum
              label: "GA Sessions"
              round: 0
      - name: engaged_sessions
        meta:
          metrics:
            total_engaged_sessions:
              type: sum
              label: "Engaged Sessions"
              round: 0
      - name: total_revenue
        description: "GA-attributed revenue (purchase events)."
        meta:
          metrics:
            ga_total_revenue:
              type: sum
              label: "GA Total Revenue"
              format: "gbp"
              round: 0
      - name: users
        description: "GA4 total users (distinct users, GA4 totalUsers) for the day. Left-joined from stg_google_analytics__users; coalesced to 0 for days with sessions but no website-overview row."
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
        meta:
          metrics:
            total_ga_users:
              type: sum
              label: "GA Users"
              round: 0
      - name: transactions
        description: "GA4 transaction count (purchase event count) for the day. Left-joined from stg_google_analytics__transactions; coalesced to 0 for days with sessions but no purchase events."
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
        meta:
          metrics:
            total_ga_transactions:
              type: sum
              label: "GA Transactions"
              round: 0

  - name: fct_ga_channel_sessions
    description: "Daily GA4 sessions and revenue by display channel and store_id (one row per session_date × store_id × channel). Sourced from BRONZE_GOOGLE_ANALYTICS_*.TRAFFIC_ACQUISITION_SESSION_DEFAULT_CHANNEL_GROUPING_REPORT, with the raw channel grouping folded into seven display channels. Powers the KPI Report's Channel breakdown table (PDF p.12). Currently iS Clinical only."
